<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="360">
  <defs>
    <radialGradient id="glow" cx="50%" cy="52%" r="55%">
      <stop offset="0%" stop-color="#1f5c3f"/>
      <stop offset="45%" stop-color="#12321f"/>
      <stop offset="100%" stop-color="#060a08"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="240" height="240" rx="54" fill="#040604"/>
  <rect x="6" y="6" width="228" height="228" rx="48" fill="url(#glow)"/>
  <text x="120" y="122" text-anchor="middle" dominant-baseline="central"
        font-family="'Arial Black','Arial Rounded MT Bold',Arial,sans-serif"
        font-weight="900" font-size="120" letter-spacing="-4"
        fill="#ffffff" filter="url(#soft)">360</text>
</svg>
